<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suffery Suffers</title>
    <!-- Tailwind CSS for modern HUD styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js Library & GLTFLoader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0e15;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* Vibrant Subway Surfers Style UI */
        .text-pop { 
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0 6px 15px rgba(0,0,0,0.6); 
            color: white;
        }
        .vibrant-panel {
            background: rgba(15, 23, 42, 0.85);
            border: 4px solid white;
            border-radius: 16px;
            /* Colorful outer border shadow effect */
            box-shadow: 0 0 0 4px #f97316, 0 8px 20px rgba(0,0,0,0.7);
        }
        .vibrant-button {
            border: 4px solid white;
            box-shadow: 0 0 0 4px #ef4444, 0 8px 25px rgba(239, 68, 68, 0.6);
        }

        .neon-text-red { text-shadow: 0 0 5px #ef4444, 0 0 10px #ef4444, 0 0 20px #b91c1c; }
        .neon-text-orange { text-shadow: 0 0 5px #f97316, 0 0 10px #f97316, 0 0 20px #c2410c; }
        
        /* Spinner Animation */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #ef4444;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- DEV TOOLS OVERLAY (Built for Sarup) -->
    <button id="devToolsToggle" class="fixed bottom-4 left-4 bg-slate-900 border-2 border-yellow-400 p-3 rounded-full z-[100] text-2xl shadow-lg shadow-yellow-500/50 hover:bg-slate-800 transition-colors">
        🛠️
    </button>
    
    <div id="devPanel" class="fixed bottom-20 left-4 bg-slate-950/95 border-2 border-yellow-400 p-4 rounded-xl z-[100] font-mono text-xs text-white shadow-xl shadow-yellow-500/20 w-72 hidden backdrop-blur-sm" style="pointer-events: auto;">
        <h3 class="text-yellow-400 font-bold mb-3 text-sm uppercase tracking-widest border-b border-yellow-400/30 pb-2">Dev Tweaker</h3>
        
        <!-- Track Scale -->
        <div class="mb-3">
            <div class="flex justify-between mb-1"><label>Track Scale Mult:</label><span id="lbl-trScale" class="text-yellow-300">1.00</span></div>
            <input type="range" id="inp-trScale" min="0.1" max="5.0" step="0.05" value="1.0" class="w-full accent-yellow-400">
        </div>
        
        <!-- Track Y -->
        <div class="mb-3">
            <div class="flex justify-between mb-1"><label>Track Y Offset:</label><span id="lbl-trY" class="text-yellow-300">0.0</span></div>
            <input type="range" id="inp-trY" min="-30" max="30" step="0.1" value="0.0" class="w-full accent-yellow-400">
        </div>
        
        <!-- Train Scale -->
        <div class="mb-3">
            <div class="flex justify-between mb-1"><label>Train Scale Mult:</label><span id="lbl-tnScale" class="text-yellow-300">1.00</span></div>
            <input type="range" id="inp-tnScale" min="0.1" max="5.0" step="0.05" value="1.0" class="w-full accent-yellow-400">
        </div>
        
        <!-- Train Y -->
        <div class="mb-4">
            <div class="flex justify-between mb-1"><label>Train Y Offset:</label><span id="lbl-tnY" class="text-yellow-300">0.0</span></div>
            <input type="range" id="inp-tnY" min="-10" max="10" step="0.1" value="0.0" class="w-full accent-yellow-400">
        </div>

        <button id="btn-exportDev" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-2 rounded uppercase tracking-wider transition-colors">
            Copy Data for AI
        </button>
    </div>

    <!-- Loading Screen Overlay -->
    <div id="loadingScreen" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950 z-50 transition-opacity duration-500">
        <h2 class="text-4xl font-black text-red-500 mb-8 uppercase tracking-widest text-pop">Downloading Assets</h2>
        <div class="spinner mb-6"></div>
        <div id="loadingText" class="text-slate-100 font-bold font-mono text-sm mb-4">Initializing Loader...</div>
        <div class="w-72 bg-slate-800 rounded-full h-4 overflow-hidden border-2 border-white box-shadow">
            <div id="loadingBar" class="bg-gradient-to-r from-red-500 to-yellow-400 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- Start Screen Overlay -->
    <div id="startScreen" class="absolute inset-0 flex flex-col items-center justify-center bg-black z-10 opacity-0 pointer-events-none transition-opacity duration-300 cursor-pointer">
        <img src="https://raw.githubusercontent.com/Sarup098/deluluprinter/main/surfers/assets/IMG_4087.PNG" alt="Suffery Suffers" class="absolute inset-0 w-full h-full object-cover">
        
        <!-- Game Title Logo -->
        <div class="absolute top-16 z-10">
            <h1 class="text-6xl md:text-8xl font-black text-pop italic transform -skew-x-6 text-center text-yellow-400">
                SUFFERY<br>SUFFERS
            </h1>
        </div>

        <!-- Pulsing Tap to Play Indicator -->
        <div class="relative z-10 flex flex-col items-center animate-pulse mt-auto mb-24">
            <div class="bg-gradient-to-r from-yellow-500 to-orange-500 px-10 py-5 rounded-full vibrant-button backdrop-blur-sm">
                <span class="text-3xl font-black text-white uppercase tracking-widest text-pop">Tap to Play</span>
            </div>
        </div>
    </div>

    <!-- HUD Overlay -->
    <div id="gameHUD" class="absolute inset-x-0 top-0 p-4 md:p-6 flex justify-between items-start pointer-events-none opacity-0 transition-opacity duration-300 z-5">
        <div class="flex flex-col space-y-2">
            <div class="vibrant-panel px-5 py-2">
                <span class="text-xs text-yellow-400 font-bold uppercase tracking-wider text-pop">Score</span>
                <div id="scoreVal" class="text-3xl md:text-4xl font-black text-white font-mono leading-none text-pop">000000</div>
            </div>
            <div id="multiplierBadge" class="self-start bg-orange-500 border-2 border-white text-white font-black text-xs px-3 py-1 rounded-full shadow-lg tracking-wider">
                1X SPEED
            </div>
        </div>
        <div class="vibrant-panel px-5 py-2 flex items-center space-x-4">
            <div class="w-10 h-10 rounded-full border-2 border-white bg-red-600 flex items-center justify-center animate-pulse shadow-md">
                <span class="text-lg font-black text-white">💀</span>
            </div>
            <div class="flex flex-col">
                <span class="text-[11px] text-red-400 font-bold uppercase tracking-wider leading-none text-pop">Jakes Hit</span>
                <span id="jakesHitVal" class="text-3xl md:text-4xl font-black text-white font-mono leading-none text-pop">0</span>
            </div>
        </div>
    </div>

    <!-- Game Over Screen Overlay -->
    <div id="gameOverScreen" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/80 backdrop-blur-md z-10 hidden transition-opacity duration-300">
        <div class="text-center p-8 max-w-md w-full mx-4 vibrant-panel">
            <h2 class="text-5xl font-black italic transform -skew-x-6 text-yellow-400 text-pop mb-2 uppercase">Crashed!</h2>
            <p class="text-white font-bold text-sm uppercase tracking-wider mb-8 text-pop">You hit an obstacle instead of Jake!</p>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-slate-900/80 p-4 rounded-xl border-2 border-white box-shadow">
                    <span class="text-xs text-yellow-400 uppercase font-black text-pop">Final Score</span>
                    <div id="finalScoreVal" class="text-3xl font-black text-white font-mono mt-1 text-pop">0</div>
                </div>
                <div class="bg-slate-900/80 p-4 rounded-xl border-2 border-white box-shadow">
                    <span class="text-xs text-red-400 uppercase font-black text-pop">Jakes Crushed</span>
                    <div id="finalJakesVal" class="text-3xl font-black text-white font-mono mt-1 text-pop">0</div>
                </div>
            </div>
            <button id="retryButton" class="w-full py-4 bg-gradient-to-r from-red-500 to-yellow-500 hover:from-red-400 hover:to-yellow-400 text-white font-black rounded-xl vibrant-button transform active:scale-95 transition-all text-xl tracking-wider uppercase text-pop">
                Rampage Again
            </button>
        </div>
    </div>

    <script>
        // --- AUDIO ENGINE ---
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        // Background Music setup
        const bgMusic = new Audio('https://raw.githubusercontent.com/Sarup098/deluluprinter/main/surfers/assets/Subway%20Surfers_%20(Main%20Theme)_%202012%20Original%20OFFICIAL.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.6;

        function initAudio() { 
            if (!audioCtx) audioCtx = new AudioCtx(); 
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        
        function playSound(type) {
            if (!audioCtx || audioCtx.state !== 'running') return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            if (type === 'splat') { 
                osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
                gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'jump') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.3);
                gain.gain.setValueAtTime(0.4, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'crash') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now); osc.frequency.exponentialRampToValueAtTime(30, now + 0.6);
                gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.6);
            }
        }

        // --- GAME VARIABLES ---
        let scene, camera, renderer;
        let playerGroup, trainMixer; 
        let lanes = [-2.6, 0, 2.6]; 
        let currentLane = 1; 
        let targetX = 0;
        let isJumping = false, isSliding = false;
        let playerVelocityY = 0;
        const gravity = -40; 
        const jumpForce = 15;
        let slideTimer = 0;
        const slideDuration = 0.6; 
        
        let gameSpeed = 30; 
        const baseSpeed = 30, maxSpeed = 75;
        let score = 0, jakesHitCount = 0;
        let isPlaying = false, isGameOver = false;

        let jakes = [], jakeMixers = [];
        let tracks = [], trackLength = 0, usableLength = 0;
        let spawnTimer = 0, spawnInterval = 1.0; 
        let clock = new THREE.Clock();

        // DEV VARIABLES
        let initialTrackY = 0;
        let initialTrainScale = 1;
        let initialTrainY = 0;
        const devConfig = { trackScaleMult: 1.0, trackYOffset: 0.0, trainScaleMult: 1.0, trainYOffset: 0.0 };

        const COLORS = {
            ambient: 0xffffff, fog: 0x0a0b10, neonRed: 0xef4444, neonOrange: 0xf97316
        };

        // --- GLTF Asset Loader ---
        const ASSET_URLS = {
            player: 'https://raw.githubusercontent.com/Sarup098/deluluprinter/main/surfers/assets/jake_subway_surfers_real.glb',
            train: 'https://raw.githubusercontent.com/Sarup098/deluluprinter/main/surfers/assets/subway_surfers_train.glb',
            environment: 'https://raw.githubusercontent.com/Sarup098/deluluprinter/main/surfers/assets/sub_way_surf_assets.glb'
        };

        const loadedModels = { player: null, train: null, environment: null };

        function loadAssets(callback) {
            const loader = new THREE.GLTFLoader();
            const keys = Object.keys(ASSET_URLS);
            let loadedCount = 0;
            const progressText = document.getElementById('loadingText');
            const progressBar = document.getElementById('loadingBar');

            keys.forEach(key => {
                loader.load(
                    ASSET_URLS[key],
                    (gltf) => {
                        loadedModels[key] = gltf;
                        loadedCount++;
                        updateProgress();
                    },
                    (xhr) => {},
                    (error) => {
                        console.error(`Error loading ${key}:`, error);
                        loadedCount++; 
                        updateProgress();
                    }
                );
            });

            function updateProgress() {
                const percent = (loadedCount / keys.length) * 100;
                progressBar.style.width = `${percent}%`;
                progressText.innerText = `Loaded ${loadedCount} of ${keys.length} assets...`;

                if (loadedCount === keys.length) {
                    progressText.innerText = "Processing Assets...";
                    setTimeout(callback, 500); 
                }
            }
        }

        function normalizeAndScaleModel(gltfScene, targetHeight, targetWidth = null) {
            const clone = gltfScene.clone();
            const box = new THREE.Box3().setFromObject(clone);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            let scale = targetHeight / size.y;
            if (targetWidth) {
                scale = Math.min(scale, targetWidth / size.x);
            }
            clone.scale.set(scale, scale, scale);

            clone.position.x = -center.x * scale;
            clone.position.y = -box.min.y * scale; 
            clone.position.z = -center.z * scale;

            clone.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            return clone;
        }

        // --- Initializing Scene and Models ---

        function initEngine() {
            const canvas = document.getElementById('gameCanvas');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(COLORS.fog);
            scene.fog = new THREE.FogExp2(COLORS.fog, 0.012);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 7.0, 16);
            camera.lookAt(new THREE.Vector3(0, 2.0, -8));

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.localClippingEnabled = true; 
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.8);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            scene.add(dirLight);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
            hemiLight.position.set(0, 20, 0);
            scene.add(hemiLight);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // --- BUILD PLAYER (WITH YOUR EXACT CALIBRATION) ---
        function buildPlayer() {
            playerGroup = new THREE.Group();
            
            if (loadedModels.train) {
                // Using exact calibrated values
                const trainModel = loadedModels.train.scene.clone();
                
                trainModel.scale.set(0.99, 0.99, 0.99);
                trainModel.position.set(-7.5, 1.5, 500); // Moved Z to 5 to be more forward
                
                // Convert 180 degrees to Radians (Math.PI)
                trainModel.rotation.set(0, Math.PI, 0); 
                
                // Ensure the raw model still casts shadows
                trainModel.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                playerGroup.add(trainModel);
                
                initialTrainScale = trainModel.scale.x;
                initialTrainY = trainModel.position.y;
            } else {
                const bodyGeo = new THREE.BoxGeometry(2.5, 5.0, 10.0);
                const bodyMat = new THREE.MeshStandardMaterial({ color: COLORS.neonRed });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.position.y = 2.5;
                playerGroup.add(body);
            }

            // TargetX dictates the lane the train is in
            playerGroup.position.set(targetX, 0, 5);
            scene.add(playerGroup);
        }

        function buildEndlessTrack() {
            if (!loadedModels.environment) return;
            
            const rawTrack = loadedModels.environment.scene;
            const wrapper = new THREE.Group();
            const rawBox = new THREE.Box3().setFromObject(rawTrack);
            const rawCenter = rawBox.getCenter(new THREE.Vector3());
            
            rawTrack.position.set(-rawCenter.x, 0, -rawCenter.z);
            wrapper.add(rawTrack);
            
            wrapper.rotation.y = -Math.PI / 2; 
            const zoomScale = 8.0; 
            wrapper.scale.set(zoomScale, zoomScale, zoomScale);
            
            wrapper.position.y = 0; 
            wrapper.updateMatrixWorld(true);
            
            // AUTO-GROUNDING LASER (V3)
            const groundRay = new THREE.Raycaster(new THREE.Vector3(0, 500, 5), new THREE.Vector3(0, -1, 0));
            const hits = groundRay.intersectObject(wrapper, true);
            
            let floorY = null;
            for (let i = 0; i < hits.length; i++) {
                if (hits[i].face && hits[i].face.normal.y > 0.5) {
                    floorY = hits[i].point.y; 
                }
            }

            if (floorY !== null) {
                wrapper.position.y = -floorY - 0.2; 
            } else {
                wrapper.position.y = -5.0; 
            }
            
            initialTrackY = wrapper.position.y;
            
            const finalBox = new THREE.Box3().setFromObject(wrapper);
            trackLength = finalBox.max.z - finalBox.min.z;
            usableLength = trackLength * 0.70; 
            
            function createTrackSegment(baseWrapper) {
                const segment = baseWrapper.clone();
                const pFront = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
                const pBack = new THREE.Plane(new THREE.Vector3(0, 0, -1), 0);
                
                segment.traverse((child) => {
                    if (child.isMesh && child.material) {
                        if (Array.isArray(child.material)) {
                            child.material = child.material.map(m => {
                                const newMat = m.clone();
                                newMat.clippingPlanes = [pFront, pBack];
                                return newMat;
                            });
                        } else {
                            child.material = child.material.clone();
                            child.material.clippingPlanes = [pFront, pBack];
                        }
                    }
                });
                
                segment.userData.pFront = pFront;
                segment.userData.pBack = pBack;
                return segment;
            }
            
            const track1 = createTrackSegment(wrapper);
            const track2 = createTrackSegment(wrapper);
            
            const startZ = 25;
            track1.position.set(0, track1.position.y, startZ - usableLength / 2);
            track2.position.set(0, track2.position.y, track1.position.z - usableLength);
            
            scene.add(track1);
            scene.add(track2);
            tracks.push(track1, track2);
        }

        function spawnJakeTarget(laneIndex, zPos) {
            const jakeGroup = new THREE.Group();

            if (loadedModels.player) {
                const customJake = normalizeAndScaleModel(loadedModels.player.scene, 2.5);
                customJake.rotation.y = 0;
                jakeGroup.add(customJake);

                if (loadedModels.player.animations && loadedModels.player.animations.length > 0) {
                    const mixer = new THREE.AnimationMixer(customJake);
                    let runAnim = loadedModels.player.animations.find(a => a.name.toLowerCase().includes('run')) || loadedModels.player.animations[0];
                    if (runAnim) mixer.clipAction(runAnim).play();
                    jakeMixers.push({ mixer: mixer, mesh: jakeGroup });
                }
            } else {
                const cylGeo = new THREE.CylinderGeometry(0.3, 0.3, 1.4);
                const cylMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6 });
                const cyl = new THREE.Mesh(cylGeo, cylMat);
                cyl.position.y = 0.7;
                jakeGroup.add(cyl);
            }

            jakeGroup.position.set(lanes[laneIndex], 0, zPos);
            scene.add(jakeGroup);
            jakes.push({ mesh: jakeGroup, lane: laneIndex });
        }

        function generateProceduralMap(dt) {
            spawnTimer += dt;
            if (spawnTimer >= spawnInterval) {
                spawnTimer = 0;
                const spawnZ = -180; 
                
                const lane = Math.floor(Math.random() * 3);
                spawnJakeTarget(lane, spawnZ);
                
                if (Math.random() > 0.5) {
                    let secondLane = Math.floor(Math.random() * 3);
                    if (secondLane !== lane) spawnJakeTarget(secondLane, spawnZ - 10);
                }
            }
        }

        function checkCollisions() {
            const pX = playerGroup.position.x;
            const pY = playerGroup.position.y;
            const pZ = playerGroup.position.z; 

            for (let i = jakes.length - 1; i >= 0; i--) {
                const jake = jakes[i];
                if (jake.lane === currentLane) {
                    const dz = Math.abs(jake.mesh.position.z - pZ);
                    const dy = Math.abs(jake.mesh.position.y - pY); 
                    if (dz < 3.0 && dy < 5.0) {
                        playSound('splat');
                        jakesHitCount++; score += 500;
                        document.getElementById('jakesHitVal').innerText = jakesHitCount;
                        
                        scene.remove(jake.mesh); 
                        jakes.splice(i, 1);
                        
                        const mixerIdx = jakeMixers.findIndex(m => m.mesh === jake.mesh);
                        if(mixerIdx !== -1) jakeMixers.splice(mixerIdx, 1);
                    }
                }
            }

            const raycaster = new THREE.Raycaster();
            const trainFront = new THREE.Vector3(pX, pY + 1.5, pZ - 4.0);
            raycaster.set(trainFront, new THREE.Vector3(0, 0, -1)); 
            
            const intersects = raycaster.intersectObjects(tracks, true);
            for (let i = 0; i < intersects.length; i++) {
                const hit = intersects[i];
                if (hit.distance < 1.0) {
                    let isClipped = false;
                    let parent = hit.object;
                    let foundTrack = null;
                    while(parent) {
                        if (parent === tracks[0] || parent === tracks[1]) {
                            foundTrack = parent;
                            break;
                        }
                        parent = parent.parent;
                    }
                    
                    if (foundTrack) {
                        const clipOffset = trackLength * 0.15;
                        const frontZ = foundTrack.position.z - trackLength / 2 + clipOffset;
                        const backZ = foundTrack.position.z + trackLength / 2 - clipOffset;
                        
                        if (hit.point.z < frontZ - 0.1 || hit.point.z > backZ + 0.1) {
                            isClipped = true;
                        }
                    }
                    
                    if (!isClipped) {
                        handleGameOver();
                        return;
                    }
                } else {
                    break; 
                }
            }
        }

        function handleGameOver() {
            isPlaying = false; isGameOver = true;
            playSound('crash');
            document.getElementById('finalScoreVal').innerText = Math.floor(score);
            document.getElementById('finalJakesVal').innerText = jakesHitCount;
            
            setTimeout(() => {
                document.getElementById('gameOverScreen').classList.remove('hidden');
                document.getElementById('gameOverScreen').classList.add('opacity-100');
                document.getElementById('gameHUD').classList.add('opacity-0');
            }, 600);
        }

        function resetGame() {
            jakes.forEach(j => scene.remove(j.mesh)); jakes = [];
            jakeMixers = [];

            currentLane = 1; targetX = lanes[currentLane];
            playerGroup.position.set(targetX, 0, 5);
            
            if(playerGroup.children[0]) {
                const trainScale = initialTrainScale * devConfig.trainScaleMult;
                playerGroup.children[0].scale.set(trainScale, trainScale, trainScale);
            }

            isJumping = false; isSliding = false; playerVelocityY = 0;
            score = 0; jakesHitCount = 0; gameSpeed = baseSpeed; spawnTimer = 0;

            document.getElementById('scoreVal').innerText = '000000';
            document.getElementById('jakesHitVal').innerText = '0';
            
            if (tracks.length === 2) {
                const startZ = 25;
                tracks[0].position.z = startZ - usableLength / 2;
                tracks[1].position.z = tracks[0].position.z - usableLength;
            }

            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('gameHUD').classList.remove('opacity-0');
            document.getElementById('gameHUD').classList.add('opacity-100');

            isGameOver = false; isPlaying = true;
            clock.getDelta();
        }

        function setupControls() {
            window.addEventListener('keydown', (e) => {
                if (!isPlaying && !isGameOver && e.key !== 'u' && e.key !== 'j') return;
                initAudio();
                if (e.key === 'ArrowLeft' || e.key === 'a') moveLane(-1);
                if (e.key === 'ArrowRight' || e.key === 'd') moveLane(1);
                if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') triggerJump();
                if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'Shift') triggerSlide();

                if (e.key === 'u' || e.key === 'U') moveTrack(0.5);
                if (e.key === 'j' || e.key === 'J') moveTrack(-0.5);
            });

            let touchX = 0, touchY = 0;
            window.addEventListener('touchstart', e => {
                touchX = e.touches[0].clientX; touchY = e.touches[0].clientY;
            }, {passive: true});
            window.addEventListener('touchend', e => {
                if (!isPlaying || isGameOver) return;
                initAudio();
                let dx = e.changedTouches[0].clientX - touchX;
                let dy = e.changedTouches[0].clientY - touchY;
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) dx > 0 ? moveLane(1) : moveLane(-1);
                else if (Math.abs(dy) > 30) dy < 0 ? triggerJump() : triggerSlide();
            }, {passive: true});
        }

        function moveTrack(amount) {
            devConfig.trackYOffset += amount;
            document.getElementById('inp-trY').value = devConfig.trackYOffset;
            document.getElementById('lbl-trY').innerText = devConfig.trackYOffset.toFixed(1);
            applyDevConfig();
        }

        // --- DEV TWEAKER LOGIC ---
        function applyDevConfig() {
            tracks.forEach(t => {
                const newScale = 8.0 * devConfig.trackScaleMult; 
                t.scale.set(newScale, newScale, newScale);
                t.position.y = initialTrackY + devConfig.trackYOffset;
            });
            if (playerGroup && playerGroup.children[0]) {
                const train = playerGroup.children[0];
                const newTrainScale = initialTrainScale * devConfig.trainScaleMult;
                train.scale.set(newTrainScale, newTrainScale, newTrainScale);
                train.position.y = initialTrainY + devConfig.trainYOffset;
            }
        }

        function setupDevToolsUI() {
            const toggle = document.getElementById('devToolsToggle');
            const panel = document.getElementById('devPanel');
            const btnExport = document.getElementById('btn-exportDev');

            toggle.addEventListener('click', (e) => {
                e.stopPropagation(); 
                panel.classList.toggle('hidden');
            });

            panel.addEventListener('touchstart', (e) => e.stopPropagation(), {passive: false});
            panel.addEventListener('touchmove', (e) => e.stopPropagation(), {passive: false});
            panel.addEventListener('touchend', (e) => e.stopPropagation(), {passive: false});

            const setupSlider = (idInp, idLbl, configKey, isFloat = true) => {
                const inp = document.getElementById(idInp);
                const lbl = document.getElementById(idLbl);
                inp.addEventListener('input', (e) => {
                    const val = parseFloat(e.target.value);
                    devConfig[configKey] = val;
                    lbl.innerText = isFloat ? val.toFixed(2) : val.toFixed(1);
                    applyDevConfig();
                });
            };

            setupSlider('inp-trScale', 'lbl-trScale', 'trackScaleMult', true);
            setupSlider('inp-trY', 'lbl-trY', 'trackYOffset', false);
            setupSlider('inp-tnScale', 'lbl-tnScale', 'trainScaleMult', true);
            setupSlider('inp-tnY', 'lbl-tnY', 'trainYOffset', false);

            btnExport.addEventListener('click', () => {
                const configText = `Track Scale Mult: ${devConfig.trackScaleMult}\nTrack Y Offset: ${devConfig.trackYOffset}\nTrain Scale Mult: ${devConfig.trainScaleMult}\nTrain Y Offset: ${devConfig.trainYOffset}`;
                const textArea = document.createElement("textarea");
                textArea.value = configText;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    btnExport.innerText = "COPIED!";
                    setTimeout(() => btnExport.innerText = "Copy Data for AI", 2000);
                } catch (err) {
                    alert("Copy failed, here is the text:\n\n" + configText);
                }
                document.body.removeChild(textArea);
            });
        }

        function moveLane(dir) {
            let n = currentLane + dir;
            if (n >= 0 && n <= 2) { currentLane = n; targetX = lanes[currentLane]; }
        }

        function triggerJump() {
            if (!isJumping && !isSliding) { isJumping = true; playerVelocityY = jumpForce; playSound('jump'); }
        }

        function triggerSlide() {
            if (!isSliding && !isJumping) {
                isSliding = true; slideTimer = slideDuration;
                playerGroup.scale.set(1, 0.5, 1); playerGroup.position.y = -0.5;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);

            if (isPlaying && !isGameOver) {
                jakeMixers.forEach(jm => {
                    jm.mixer.update(dt * 1.5); 
                });

                generateProceduralMap(dt);
                
                gameSpeed = Math.min(baseSpeed + (score / 1500), maxSpeed);
                score += dt * gameSpeed * 0.5;
                document.getElementById('scoreVal').innerText = String(Math.floor(score)).padStart(6, '0');
                document.getElementById('multiplierBadge').innerText = (Math.floor((gameSpeed/baseSpeed)*10)/10) + "X SPEED";

                playerGroup.position.x = THREE.MathUtils.lerp(playerGroup.position.x, targetX, 10 * dt); 

                if (isJumping) {
                    playerVelocityY += gravity * dt;
                    playerGroup.position.y += playerVelocityY * dt;
                    if (playerGroup.position.y <= 0) { playerGroup.position.y = 0; isJumping = false; playerVelocityY = 0; }
                } else if (isSliding) {
                    slideTimer -= dt;
                    if (slideTimer <= 0) { isSliding = false; playerGroup.scale.set(1, 1, 1); playerGroup.position.y = 0; }
                }

                tracks.forEach(track => {
                    track.position.z += gameSpeed * dt;
                    
                    if (track.position.z - usableLength / 2 > 20) {
                        let otherTrack = tracks.find(t => t !== track);
                        if (otherTrack) {
                            track.position.z = otherTrack.position.z - usableLength;
                        }
                    }

                    const clipOffset = trackLength * 0.15;
                    const frontZ = track.position.z - trackLength / 2 + clipOffset;
                    const backZ = track.position.z + trackLength / 2 - clipOffset;
                    
                    track.userData.pFront.constant = -frontZ;
                    track.userData.pBack.constant = backZ;
                });

                for (let i = jakes.length - 1; i >= 0; i--) {
                    jakes[i].mesh.position.z += gameSpeed * dt;
                    if (jakes[i].mesh.position.z > 20) { 
                        scene.remove(jakes[i].mesh); 
                        const mixerIdx = jakeMixers.findIndex(m => m.mesh === jakes[i].mesh);
                        if(mixerIdx !== -1) jakeMixers.splice(mixerIdx, 1);
                        jakes.splice(i, 1); 
                    }
                }

                checkCollisions();
            }
            renderer.render(scene, camera);
        }

        // Boot Sequence
        window.onload = function() {
            initEngine();
            setupDevToolsUI(); 
            
            loadAssets(() => {
                document.getElementById('loadingScreen').classList.add('opacity-0', 'pointer-events-none');
                
                const startScreen = document.getElementById('startScreen');
                startScreen.classList.remove('opacity-0', 'pointer-events-none');
                startScreen.classList.add('pointer-events-auto');
                
                buildPlayer(); 
                buildEndlessTrack();
                setupControls();
            });

            document.getElementById('startScreen').addEventListener('click', () => {
                if(isPlaying) return; 
                initAudio();
                
                bgMusic.play().catch(e => console.log("Audio play prevented", e));

                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('gameHUD').classList.remove('opacity-0');
                document.getElementById('gameHUD').classList.add('opacity-100');
                isPlaying = true;
                clock.getDelta();
            });

            document.getElementById('retryButton').addEventListener('click', resetGame);

            animate();
        };
    </script>
</body>
</html>
